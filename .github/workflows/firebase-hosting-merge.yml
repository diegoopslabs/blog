name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
  schedule:
    # Picks up Notion edits even when no code changes are pushed.
    - cron: '0 * * * *'
  workflow_dispatch: {}
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run build
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          NOTION_DESK_DATABASE_ID: ${{ secrets.NOTION_DESK_DATABASE_ID }}
      - name: Deploy to Firebase Hosting
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_FIELD_NOTES_BLOG_CSUAZAN }}'
        run: |
          echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > "$RUNNER_TEMP/firebase-service-account.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/firebase-service-account.json"
          npx firebase-tools@latest deploy --only hosting --project field-notes-blog-csuazan --non-interactive
